# tests/test_config.yaml
# Unified test configuration - ALL tests use this

# Vector DB
vector_db: pgvector
vector_db_kwargs: {}

# Tiered execution (local -> cloud fallback)
# Each tier specifies its own chat AND embedding to isolate failures
tiers:
  - name: local
    chat: ollama
    chat_models:
      smart: qwen3.5:4b
      fast: qwen3.5:2b
      balanced: qwen3.5:4b
    embedding: ollama
    embedding_model: nomic-embed-text

  - name: cloud
    chat: cohere
    chat_models:
      smart: command-a-03-2025
      fast: command-r7b-12-2024
      balanced: command-r-08-2024
    embedding: cohere
    embedding_model: embed-v4.0

# Response cache (E2E)
cache:
  enabled: true
  max_entries: 1000
  ttl_days: 30
