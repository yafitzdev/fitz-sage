# .github/workflows/mutation.yml
#
# Mutation Testing for Fitz - Split across days
# Each day tests a different part of core/ to fit within 6h limit

name: Mutation Testing

on:
  schedule:
    # Sunday: guardrails
    - cron: "0 3 * * 0"
    # Monday: paths
    - cron: "0 3 * * 1"
    # Tuesday: top-level core files
    - cron: "0 3 * * 2"
  workflow_dispatch:
    inputs:
      target:
        description: 'Which part to test'
        required: true
        default: 'guardrails'
        type: choice
        options:
          - guardrails
          - paths
          - core-files

jobs:
  mutation:
    name: Mutation Testing
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Determine target
        id: target
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TARGET="${{ inputs.target }}"
          else
            # Determine by day of week (0=Sunday, 1=Monday, 2=Tuesday)
            DAY=$(date +%w)
            case $DAY in
              0) TARGET="guardrails" ;;
              1) TARGET="paths" ;;
              2) TARGET="core-files" ;;
              *) TARGET="guardrails" ;;
            esac
          fi
          echo "target=$TARGET" >> $GITHUB_OUTPUT
          echo "Testing: $TARGET"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-mutation-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-mutation-
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pydantic pyyaml httpx typing-extensions typer jinja2
          pip install pytest pytest-cov pytest-xdist psutil hypothesis
          pip install numpy faiss-cpu cryptography
          pip install "mutmut>=2.4,<3"
          pip install -e . --no-deps

      - name: Run mutation tests
        id: mutation
        continue-on-error: true
        run: |
          TARGET="${{ steps.target.outputs.target }}"

          case $TARGET in
            guardrails)
              PATHS="fitz_ai/core/guardrails/"
              ;;
            paths)
              PATHS="fitz_ai/core/paths/"
              ;;
            core-files)
              # Create temp file with only top-level .py files
              PATHS="fitz_ai/core/answer.py,fitz_ai/core/answer_mode.py,fitz_ai/core/answer_mode_resolver.py,fitz_ai/core/chunk.py,fitz_ai/core/config.py,fitz_ai/core/conflicts.py,fitz_ai/core/constants.py,fitz_ai/core/constraints.py,fitz_ai/core/detect.py,fitz_ai/core/document.py,fitz_ai/core/engine.py,fitz_ai/core/exceptions.py,fitz_ai/core/http.py,fitz_ai/core/instrumentation.py,fitz_ai/core/knowledge.py,fitz_ai/core/platform.py,fitz_ai/core/provenance.py,fitz_ai/core/query.py,fitz_ai/core/registry.py,fitz_ai/core/utils.py"
              ;;
          esac

          echo "=== Mutating: $PATHS ==="
          echo "=== Running tests: tests/unit/ + tests/integration/ ==="

          # Run mutmut with specific paths
          timeout 21600 python -m mutmut run \
            --paths-to-mutate "$PATHS" \
            --tests-dir tests/ \
            --runner "python -m pytest tests/unit/ tests/integration/ -x -q --tb=no --ignore=tests/unit/test_postgres_recovery.py" \
            --CI || true

          echo ""
          echo "=== Mutation Results ==="
          python -m mutmut results > mutation_summary.txt 2>&1 || true
          cat mutation_summary.txt || true

          # Parse results
          KILLED=$(grep -oE '🎉 [0-9]+' mutation_summary.txt | grep -oE '[0-9]+' | tail -1 || echo "0")
          SURVIVED=$(grep -oE '🙁 [0-9]+' mutation_summary.txt | grep -oE '[0-9]+' | tail -1 || echo "0")
          KILLED=${KILLED:-0}
          SURVIVED=${SURVIVED:-0}
          TOTAL=$((KILLED + SURVIVED))

          echo "Killed: $KILLED, Survived: $SURVIVED, Total: $TOTAL"

          if [ $TOTAL -gt 0 ]; then
            SCORE=$(awk "BEGIN {printf \"%.1f\", $KILLED * 100 / $TOTAL}")
          else
            SCORE="N/A"
          fi

          echo "mutation_score=$SCORE" >> $GITHUB_OUTPUT
          echo "killed=$KILLED" >> $GITHUB_OUTPUT
          echo "survived=$SURVIVED" >> $GITHUB_OUTPUT
          echo "target=$TARGET" >> $GITHUB_OUTPUT

      - name: Generate HTML report
        run: |
          python -m mutmut html || true

      - name: Upload mutation report
        uses: actions/upload-artifact@v4
        with:
          name: mutation-report-${{ steps.target.outputs.target }}
          path: |
            html/
            mutation_summary.txt
          retention-days: 30

      - name: Post summary
        run: |
          echo "## Mutation Testing Results: ${{ steps.mutation.outputs.target }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Target | ${{ steps.mutation.outputs.target }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Mutation Score | ${{ steps.mutation.outputs.mutation_score }}% |" >> $GITHUB_STEP_SUMMARY
          echo "| Killed | ${{ steps.mutation.outputs.killed }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Survived | ${{ steps.mutation.outputs.survived }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "See artifacts for detailed HTML report." >> $GITHUB_STEP_SUMMARY
