# .github/workflows/mutation.yml
#
# Mutation Testing for Fitz - Split across 3 days
# Sun: guardrails/, Mon: paths/, Tue: core/*.py

name: Mutation Testing

on:
  schedule:
    - cron: "0 3 * * 0"  # Sunday: guardrails
    - cron: "0 3 * * 1"  # Monday: paths
    - cron: "0 3 * * 2"  # Tuesday: core-files
  workflow_dispatch:
    inputs:
      target:
        description: 'Which part to test'
        required: true
        default: 'guardrails'
        type: choice
        options:
          - guardrails
          - paths
          - core-files

jobs:
  mutation:
    name: Mutation Testing
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Determine target
        id: target
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TARGET="${{ inputs.target }}"
          else
            DAY=$(date +%w)
            case $DAY in
              0) TARGET="guardrails" ;;
              1) TARGET="paths" ;;
              2) TARGET="core-files" ;;
              *) TARGET="guardrails" ;;
            esac
          fi
          echo "target=$TARGET" >> $GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-mutation-${{ hashFiles('**/pyproject.toml') }}

      - name: Install dependencies
        run: |
          pip install -q pydantic pyyaml httpx typing-extensions typer jinja2
          pip install -q pytest pytest-cov pytest-xdist psutil hypothesis
          pip install -q cryptography
          pip install -q "mutmut>=2.4,<3"
          pip install -q -e . --no-deps

      - name: Run mutation tests
        id: mutation
        continue-on-error: true
        run: |
          TARGET="${{ steps.target.outputs.target }}"

          case $TARGET in
            guardrails) PATHS="fitz_sage/engines/fitz_krag/guardrails/" ;;
            paths) PATHS="fitz_sage/core/paths/" ;;
            core-files) PATHS="fitz_sage/core/answer.py,fitz_sage/core/answer_mode.py,fitz_sage/core/chunk.py,fitz_sage/core/config.py,fitz_sage/core/constants.py,fitz_sage/core/constraints.py,fitz_sage/core/detect.py,fitz_sage/core/document.py,fitz_sage/core/engine.py,fitz_sage/core/http.py,fitz_sage/core/registry.py,fitz_sage/core/utils.py" ;;
          esac

          echo "Target: $TARGET"
          echo "Paths: $PATHS"

          # Run mutmut, capture output, only show last 30 lines to reduce spam
          timeout 21600 python -m mutmut run \
            --paths-to-mutate "$PATHS" \
            --tests-dir tests/ \
            --runner "python -m pytest tests/unit/ tests/integration/ -x -q --tb=no --ignore=tests/unit/test_postgres_recovery.py" \
            --CI 2>&1 | tee mutmut_output.log | grep -E '(^[0-9]|🎉|🙁|===|Error|FAILED)' | tail -50 || true

          echo ""
          echo "=== Final Status ==="
          # Get the last progress line with counts
          FINAL_LINE=$(grep -E '🎉.*🙁' mutmut_output.log | tail -1)
          echo "$FINAL_LINE"

          # Parse killed and survived from the progress line
          KILLED=$(echo "$FINAL_LINE" | grep -oE '🎉 [0-9]+' | grep -oE '[0-9]+' || echo "0")
          SURVIVED=$(echo "$FINAL_LINE" | grep -oE '🙁 [0-9]+' | grep -oE '[0-9]+' || echo "0")

          KILLED=${KILLED:-0}
          SURVIVED=${SURVIVED:-0}
          TOTAL=$((KILLED + SURVIVED))

          if [ $TOTAL -gt 0 ]; then
            SCORE=$(awk "BEGIN {printf \"%.1f\", $KILLED * 100 / $TOTAL}")
          else
            SCORE="N/A"
          fi

          echo "Killed: $KILLED, Survived: $SURVIVED, Score: $SCORE%"

          echo "mutation_score=$SCORE" >> $GITHUB_OUTPUT
          echo "killed=$KILLED" >> $GITHUB_OUTPUT
          echo "survived=$SURVIVED" >> $GITHUB_OUTPUT
          echo "target=$TARGET" >> $GITHUB_OUTPUT

          # Save summary for artifact
          echo "Target: $TARGET" > mutation_summary.txt
          echo "Killed: $KILLED" >> mutation_summary.txt
          echo "Survived: $SURVIVED" >> mutation_summary.txt
          echo "Score: $SCORE%" >> mutation_summary.txt
          echo "" >> mutation_summary.txt
          python -m mutmut results 2>&1 | head -100 >> mutation_summary.txt || true

      - name: Generate HTML report
        run: python -m mutmut html 2>/dev/null || true

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: mutation-${{ steps.target.outputs.target }}
          path: |
            html/
            mutation_summary.txt
          retention-days: 30

      - name: Summary
        run: |
          echo "## Mutation Testing: ${{ steps.mutation.outputs.target }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Score** | **${{ steps.mutation.outputs.mutation_score }}%** |" >> $GITHUB_STEP_SUMMARY
          echo "| Killed | ${{ steps.mutation.outputs.killed }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Survived | ${{ steps.mutation.outputs.survived }} |" >> $GITHUB_STEP_SUMMARY
